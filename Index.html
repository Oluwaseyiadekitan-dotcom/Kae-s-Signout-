<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Congratulations Doctor.</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;
overflow:hidden;
font-family:Poppins,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;

}

/* Animated Background */

canvas{

position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:0;

}

.glow{

position:absolute;
width:450px;
height:450px;
background:radial-gradient(circle,#d4af3740,transparent);
filter:blur(70px);
animation:float 9s ease-in-out infinite;
}

@keyframes float{

0%{transform:translate(-100px,-70px);}
50%{transform:translate(130px,70px);}
100%{transform:translate(-100px,-70px);}

}

.container{

position:relative;
z-index:10;
text-align:center;
max-width:850px;
padding:40px;

}

h1{

font-size:65px;
font-family:'Cormorant Garamond',serif;
font-weight:700;
margin-bottom:15px;
opacity:0;
transform:translateY(40px);

animation:fade 1.5s forwards;

}

.subtitle{

font-size:20px;
color:#d8d8d8;
margin-bottom:50px;
line-height:1.8;
opacity:0;
animation:fade 2s forwards;
animation-delay:.8s;

}

button{

padding:18px 45px;
font-size:17px;
background:transparent;
border:1px solid #d4af37;
color:#d4af37;
cursor:pointer;
border-radius:50px;
transition:.5s;

}

button:hover{

background:#d4af37;
color:black;
transform:scale(1.08);

}

.hidden{

opacity:0;
transform:translateY(30px);
transition:1.2s;

}

.show{

opacity:1;
transform:translateY(0);

}

#question{

margin-top:60px;

}

#question h2{

font-size:48px;
font-family:'Cormorant Garamond',serif;
margin-bottom:15px;

}

#question p{

font-size:18px;
color:#bbb;
margin-bottom:30px;

}

@keyframes fade{

to{

opacity:1;
transform:translateY(0);

}

}

.arrow{

font-size:40px;
margin-top:30px;
animation:bounce 1.5s infinite;

}

@keyframes bounce{

50%{

transform:translateY(12px);

}

}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div class="glow"></div>

<div class="container">

<h1>Congratulations<br>Dr. Ebiyomare Kelvin Edesiri.</h1>

<p class="subtitle">

Eight years.<br>

Countless sleepless nights.<br>

Thousands of pages.<br>

One remarkable destination.

</p>

<button onclick="reveal()">

Tap Here

</button>

<div id="question" class="hidden">

<h2>

Do you want to see what's in store?

</h2>

<p>

Someone who loves you has been quietly watching your journey...

and has something waiting for you.

</p>

<button onclick="window.location='story.html'">

Yes, Take Me There →

</button>

<div class="arrow">

↓

</div>

</div>

</div>

<script>

function reveal(){

document.getElementById("question").classList.add("show");

}

// Floating Stars

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<140;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-.5)*.5,
dy:(Math.random()-.5)*.5

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#d4af37";
ctx.fill();

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

});

requestAnimationFrame(animate);

}

animate();

window.addEventListener('resize',()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

});

</script>

</body>
</html>
